name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgresql://rantai_billing:rantai_billing@localhost:5433/rantai_billing_test

jobs:
  frontend-tests:
    name: Next.js Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun lint

      - name: Type check
        run: bun run build

      - name: Run tests
        run: bunx vitest run

  rust-tests:
    name: Rust Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: rantai_billing
          POSTGRES_PASSWORD: rantai_billing
          POSTGRES_DB: rantai_billing_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U rantai_billing"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rustbill

      - name: Check formatting
        working-directory: rustbill
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: rustbill
        run: cargo clippy --all-targets -- -D warnings 2>/dev/null || cargo clippy --all-targets

      - name: Build
        working-directory: rustbill
        run: cargo build --tests

      - name: Run tests
        working-directory: rustbill
        run: cargo test --test-threads=1
        env:
          DATABASE_URL: postgresql://rantai_billing:rantai_billing@localhost:5433/rantai_billing_test
